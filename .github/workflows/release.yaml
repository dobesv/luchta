name: Release

on:
  push:
    tags:
    # knope tags releases as `luchta/v<version>` (the package-prefixed form
    # from the [packages.luchta] config). The bare `v<version>` pattern is also
    # matched for any manual tags that don't go through knope.
    - 'luchta/v[0-9]+.[0-9]+.[0-9]+*'
    - 'v[0-9]+.[0-9]+.[0-9]+*'
  # Allow building a release on demand against an arbitrary ref without a tag.
  workflow_dispatch:

jobs:
  release:
    name: Build & publish binaries
    timeout-minutes: 60
    permissions:
      contents: write
    outputs:
      rc: ${{ steps.check-tag.outputs.rc }}

    strategy:
      # Surface every target's failure in one run instead of cancelling on the
      # first error. Each platform builds independently and partial success is
      # still useful to ship.
      fail-fast: false
      # Same three-platform coverage as harnx: Linux (x86_64 + aarch64, musl
      # static via cross), macOS (x86_64 + aarch64), and Windows (x86_64 +
      # aarch64 + i686). `use-cross: true` jobs build inside a cross container;
      # the rest build natively on the matching runner.
      matrix:
        include:
        - target: aarch64-unknown-linux-musl
          os: ubuntu-latest
          use-cross: true
        - target: aarch64-apple-darwin
          os: macos-latest
          # macos-latest runners are ARM64, so this builds natively.
          use-cross: false
        - target: aarch64-pc-windows-msvc
          os: windows-latest
          use-cross: true
        - target: x86_64-apple-darwin
          os: macos-latest
          use-cross: false
        - target: x86_64-pc-windows-msvc
          os: windows-latest
          use-cross: false
        - target: x86_64-unknown-linux-musl
          os: ubuntu-latest
          use-cross: true
        - target: i686-pc-windows-msvc
          os: windows-latest
          use-cross: true

    runs-on: ${{ matrix.os }}
    env:
      BUILD_CMD: cargo

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Initialize submodules
      shell: bash
      run: git submodule update --init --recursive

    - name: Check tag
      id: check-tag
      shell: bash
      run: |
        # For tag pushes the version is the ref tail; for workflow_dispatch
        # there is no tag, so fall back to the short SHA.
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          ver=${GITHUB_REF##*/}
        else
          ver=$(git rev-parse --short HEAD)
        fi
        echo "version=$ver" >> "$GITHUB_OUTPUT"
        # A plain X.Y.Z tail is a final release; anything else (rc, beta, a
        # bare SHA) is treated as a prerelease.
        if [[ "$ver" =~ [0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "rc=false" >> "$GITHUB_OUTPUT"
        else
          echo "rc=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    # rust-toolchain.toml pins the active toolchain, so `cargo build` uses it
    # rather than the `stable` toolchain dtolnay set up — the target stdlib
    # must be added to the active toolchain too. cross also silently falls back
    # to plain cargo when no Docker image exists for a target (e.g. the Windows
    # MSVC targets), so the rustup target must be present even on
    # `use-cross: true` jobs. When cross does run a real container build,
    # `rustup target add` is a harmless no-op against the host toolchain.
    - name: Install Rust target for active toolchain
      shell: bash
      run: rustup target add ${{ matrix.target }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - uses: Swatinem/rust-cache@v2

    - name: Install cross
      if: matrix.use-cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Use cross as the build command
      if: matrix.use-cross
      shell: bash
      run: echo "BUILD_CMD=cross" >> "$GITHUB_ENV"

    - name: Show version information
      shell: bash
      run: |
        rustup -V || true
        cargo -V
        rustc -V

    - name: Build
      shell: bash
      run: |
        $BUILD_CMD build --locked --release --target=${{ matrix.target }} \
          -p luchta-cli \
          -p luchta-yarn-worker \
          -p luchta-bash-worker \
          -p luchta-command-filter \
          -p luchta-file-exists-filter \
          -p luchta-lazy-worker \
          -p luchta-yarn-filter \
          -p luchta-oxlint-worker \
          -p luchta-oxc-transform-worker \
          -p luchta-oxfmt-worker

    - name: Build tsc worker
      shell: bash
      run: cargo xtask build-worker --target ${{ matrix.target }} --out-dir "target/${{ matrix.target }}/release"

    # Smoke test: run each freshly built binary so a broken artifact (bad
    # dynamic linking, missing symbols) fails the job before it is published.
    # Only run on native (`use-cross: false`) targets — the host can execute
    # those: windows-latest is x86_64, and macos-latest (ARM) runs the
    # x86_64-apple-darwin binary via Rosetta 2. cross targets can't run here.
    #
    # Each binary has its own clean exit-0 probe:
    # - `luchta` has no `--version` flag, so `--help` is the probe.
    # - `luchta-yarn-worker` / `luchta-bash-worker` are stdin-driven JSONL workers
    #   without CLI flags; empty stdin hits EOF and exits 0.
    # - The proxy filters/worker require `<args> -- <delegate command>`. Empty
    #   stdin makes the read loop hit EOF and exit 0 before the delegate is ever
    #   spawned (it spawns lazily on the first forwarded message), so the
    #   placeholder `true` delegate is never executed — it only satisfies arg
    #   validation. command-filter needs a predicate token; file-exists-filter
    #   needs a glob pattern.
    - name: Smoke test binaries
      if: ${{ !matrix.use-cross }}
      shell: bash
      run: |
        ext=""
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          ext=".exe"
        fi
        rel="target/${{ matrix.target }}/release"

        "$rel/luchta$ext" --help
        printf '' | "$rel/luchta-yarn-worker$ext"
        printf '' | "$rel/luchta-bash-worker$ext"
        printf '' | "$rel/luchta-command-filter$ext" true -- true
        printf '' | "$rel/luchta-file-exists-filter$ext" '*' -- true
        printf '' | "$rel/luchta-lazy-worker$ext" -- true
        printf '' | "$rel/luchta-yarn-filter$ext" -- true
        printf '' | "$rel/luchta-tsc-worker$ext"
        printf '' | "$rel/luchta-oxlint-worker$ext"
        printf '' | "$rel/luchta-oxc-transform-worker$ext"
        printf '' | "$rel/luchta-oxfmt-worker$ext"

    - name: Build archive
      id: package
      shell: bash
      env:
        target: ${{ matrix.target }}
        version: ${{ steps.check-tag.outputs.version }}
      run: |
        set -euxo pipefail

        dist_dir="$(pwd)/dist"
        staging="$dist_dir/stage"
        mkdir -p "$staging"

        # Every shipped binary. `luchta` comes from luchta-cli; the rest are
        # named after their crate. Each is copied into the archive (with the
        # `.exe` suffix on Windows).
        ext=""
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          ext=".exe"
        fi
        for bin in \
          luchta \
          luchta-yarn-worker \
          luchta-bash-worker \
          luchta-command-filter \
          luchta-file-exists-filter \
          luchta-lazy-worker \
          luchta-yarn-filter \
          luchta-tsc-worker \
          luchta-oxlint-worker \
          luchta-oxc-transform-worker \
          luchta-oxfmt-worker; do
          cp "target/$target/release/$bin$ext" "$staging/"
        done

        name="luchta-$version-$target"
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          archive="$dist_dir/$name.zip"
          (cd "$staging" && 7z a "$archive" *)
          echo "archive=dist/$name.zip" >> "$GITHUB_OUTPUT"
        else
          archive="$dist_dir/$name.tar.gz"
          (cd "$staging" && tar -czf "$archive" *)
          echo "archive=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish archive
      uses: softprops/action-gh-release@v2
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      with:
        draft: false
        files: ${{ steps.package.outputs.archive }}
        prerelease: ${{ steps.check-tag.outputs.rc == 'true' }}

    - name: Upload archive as workflow artifact
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@v4
      with:
        name: luchta-${{ matrix.target }}
        path: ${{ steps.package.outputs.archive }}
